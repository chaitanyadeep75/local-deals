<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Full bleed background (maskable — no rounded corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Bolt inside safe zone (80px padding = ~15%) -->
  <path d="M296 100 L180 285 L248 285 L222 412 L332 225 L264 225 Z" fill="url(#bolt)" filter="url(#glow)"/>
</svg>
